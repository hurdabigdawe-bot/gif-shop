<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Blackjack</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="userPanel" class="user-panel">

<a href="/login/" id="loginLink">
🔐 Bejelentkezés
</a>

<div id="userInfo" style="display:none">

<div class="user-data">

<div id="userEmail"></div>

<div id="userCredits">
💰 0 kredit
</div>

</div>

<button id="logoutBtn">
🚪 Kilépés
</button>

</div>

</div>

<div class="table">

<h1>🃏 BLACKJACK</h1>

<div class="bank">
💰 Egyenleg:
<span id="balance">0</span>
</div>

<div class="bet-area">

<p>
Tét:
<span id="betValue">10</span>
</p>

<button class="bet-btn" data-bet="10">
10
</button>

<button class="bet-btn" data-bet="50">
50
</button>

<button class="bet-btn" data-bet="100">
100
</button>

<button class="bet-btn" data-bet="500">
500
</button>

</div>

<div class="dealer-section">

<h2>🤵 Dealer</h2>

<div id="dealerCards" class="cards"></div>

<div id="dealerScore">
Pont: ?
</div>

</div>

<div class="player-section">

<h2>😎 Te</h2>

<div id="playerCards" class="cards"></div>

<div id="playerScore">
Pont: 0
</div>

</div>

<div class="controls">

<button id="dealBtn">
🎲 OSZTÁS
</button>

<button id="hitBtn">
➕ LAPOT
</button>

<button id="standBtn">
✋ MEGÁLLOK
</button>

</div>

<div id="message">
Válassz tétet és nyomj OSZTÁST.
</div>

<a href="/" class="back-btn">
🎁 Vissza a főoldalra
</a>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
