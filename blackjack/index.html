<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🃏 Blackjack Casino V6</title>

<link rel="stylesheet"
href="style.css">

</head>
<body>

<div class="bg-glow"></div>

<header class="topbar">

<div class="top-left">

<div class="logo">
🃏 Blackjack
</div>

<nav class="top-nav">

<a href="/" class="nav-link">
🏠 Dashboard
</a>

<a href="/profil/" class="nav-link">
👤 Profil
</a>

<a href="/toplista/" class="nav-link">
🏆 Toplista
</a>

</nav>

</div>

<div id="userPanel">

<a href="/login/"
id="loginLink"
class="login-btn">

🔐 Bejelentkezés

</a>

<div id="userInfo"
style="display:none">

<div class="user-card">

<div id="userEmail">
👤 Felhasználó
</div>

<div id="userCredits">
💰 0 kredit
</div>

<div id="userRank">
🥉 Bronze
</div>

</div>

<button id="logoutBtn">
Kilépés
</button>

</div>

</div>

</header>

<main class="container">

<!-- KOMPAKT STATS -->

<section class="stats-bar">

<div class="mini-stat">

<span>💰</span>

<strong id="balance">
0
</strong>

</div>

<div class="mini-stat">

<span>🏆</span>

<strong id="userWins">
0
</strong>

</div>

<div class="mini-stat">

<span>❌</span>

<strong id="userLosses">
0
</strong>

</div>

<div class="mini-stat">

<span>📈</span>

<strong id="userWinRate">
0%
</strong>

</div>

</section>

<!-- ASZTAL -->

<section class="table-card">

<div class="table-header">

<div class="side-title">

🎩 Dealer

</div>

<div id="dealerScore"
class="score">

Pont: 0

</div>

</div>

<div id="dealerCards"
class="cards">

</div>

<div class="table-center">

<div id="message">

Nyomd meg az Osztás gombot.

</div>

</div>

<div id="playerCards"
class="cards">

</div>

<div class="table-footer">

<div class="side-title">

😎 Játékos

</div>

<div id="playerScore"
class="score">

Pont: 0

</div>

</div>

</section>

<!-- JÁTÉKPANEL -->

<section class="game-panel">

<div class="bet-section">

<h3>
💵 Tét
</h3>

<div class="chips">

<button
class="bet-btn"
data-bet="100">

100

</button>

<button
class="bet-btn"
data-bet="500">

500

</button>

<button
class="bet-btn"
data-bet="1000">

1000

</button>

<button
class="bet-btn"
data-bet="5000">

5000

</button>

<button
class="bet-btn"
data-bet="10000">

10000

</button>

</div>

<div class="current-bet">

Tét:

<span id="betValue">

100

</span>

kredit

</div>

</div>

<div class="controls">

<button id="dealBtn">

🃏 Osztás

</button>

<button id="hitBtn">

➕ Lapot kérek

</button>

<button id="doubleBtn">

💎 Double

</button>

<button id="standBtn">

✋ Megállok

</button>

</div>

</section>

<section class="achievement-panel">

<h3>
🏅 Achievementek
</h3>

<div id="achievementPreview">

Achievement rendszer aktív

</div>

</section>

</main>

<div id="toast"
class="toast">

🏅 Achievement Feloldva

</div>

<script type="module"
src="firebase.js"></script>

<script type="module"
src="script.js"></script>

</body>
</html>
