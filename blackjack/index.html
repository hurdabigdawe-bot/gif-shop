<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🃏 Blackjack Casino V7</title>

<link rel="stylesheet"
href="style.css">

</head>
<body>

<div class="bg-glow"></div>

<header class="topbar">

<div class="logo">

🃏 Blackjack

</div>

<nav class="top-nav">

<a href="/"
class="nav-link">

🏠 Dashboard

</a>

<a href="/profil/"
class="nav-link">

👤 Profil

</a>

<a href="/toplista/"
class="nav-link">

🏆 Toplista

</a>

</nav>

<div id="userPanel">

<a href="/login/"
id="loginLink"
class="login-btn">

🔐 Bejelentkezés

</a>

<div id="userInfo"
style="display:none">

<div class="user-card">

<div id="userEmail">

👤 Felhasználó

</div>

<div id="userCredits">

💰 0 kredit

</div>

<div id="userRank">

🥉 Bronze

</div>

</div>

<button id="logoutBtn">

Kilépés

</button>

</div>

</div>

</header>

<main class="container">

<!-- STATS -->

<section class="stats-row">

<div class="mini-stat">

<span>💰</span>

<strong id="balance">

0

</strong>

</div>

<div class="mini-stat">

<span>🏆</span>

<strong id="userWins">

0

</strong>

</div>

<div class="mini-stat">

<span>❌</span>

<strong id="userLosses">

0

</strong>

</div>

<div class="mini-stat">

<span>📈</span>

<strong id="userWinRate">

0%

</strong>

</div>

</section>

<!-- MAIN LAYOUT -->

<section class="casino-layout">

<!-- LEFT PANEL -->

<aside class="bet-panel">

<div class="panel-card">

<h3>

💵 Tét

</h3>

<div class="chips">

<button
class="bet-btn"
data-bet="100">

100

</button>

<button
class="bet-btn"
data-bet="500">

500

</button>

<button
class="bet-btn"
data-bet="1000">

1000

</button>

<button
class="bet-btn"
data-bet="5000">

5000

</button>

<button
class="bet-btn"
data-bet="10000">

10000

</button>

</div>

<div class="current-bet">

Tét:
<span id="betValue">

100

</span>

</div>

</div>

<div class="panel-card">

<div class="controls">

<button id="dealBtn">

🃏 Osztás

</button>

<button id="hitBtn">

➕ Lapot kérek

</button>

<button id="doubleBtn">

💎 Double

</button>

<button id="standBtn">

✋ Megállok

</button>

</div>

</div>

<div class="panel-card">

<h3>

🏅 Achievementek

</h3>

<div id="achievementPreview">

Achievement rendszer aktív

</div>

</div>

</aside>

<!-- TABLE -->

<section class="table-panel">

<div class="dealer-section">

<div class="table-title">

🎩 Dealer

<span id="dealerScore">

Pont: 0

</span>

</div>

<div id="dealerCards"
class="cards">

</div>

</div>

<div class="table-message">

<div id="message">

Nyomd meg az Osztás gombot.

</div>

</div>

<div class="player-section">

<div id="playerCards"
class="cards">

</div>

<div class="table-title">

😎 Játékos

<span id="playerScore">

Pont: 0

</span>

</div>

</div>

</section>

</section>

</main>

<div id="toast"
class="toast">

🏅 Achievement Feloldva

</div>

<script type="module"
src="firebase.js"></script>

<script type="module"
src="script.js"></script>

</body>
</html>
