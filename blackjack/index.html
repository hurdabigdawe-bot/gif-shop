<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Blackjack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="userPanel" class="user-panel">

<a href="/login/" id="loginLink">
🔐 Bejelentkezés
</a>

<div id="userInfo" style="display:none">

<span id="userEmail"></span>

<button id="logoutBtn">
🚪 Kilépés
</button>

</div>

</div>

<div class="table">

<h1>🃏 BLACKJACK</h1>

<div class="bank">
💰 Egyenleg:
<span id="balance">1000</span>
</div>

<div class="bet-area">

<p>Tét: <span id="betValue">10</span></p>

<button class="bet-btn" data-bet="10">10</button>
<button class="bet-btn" data-bet="50">50</button>
<button class="bet-btn" data-bet="100">100</button>
<button class="bet-btn" data-bet="500">500</button>

</div>

<div class="dealer-section">

<h2>🤵 Dealer</h2>

<div id="dealerCards" class="cards"></div>

<div id="dealerScore">Pont: ?</div>

</div>

<div class="player-section">

<h2>😎 Te</h2>

<div id="playerCards" class="cards"></div>

<div id="playerScore">Pont: 0</div>

</div>

<div class="controls">

<button id="dealBtn">
🎲 OSZTÁS
</button>

<button id="hitBtn">
➕ LAPOT
</button>

<button id="standBtn">
✋ MEGÁLLOK
</button>

</div>

<div id="message">
Válassz tétet és nyomj OSZTÁST.
</div>

<a href="/" class="back-btn">
🎁 Vissza
</a>

</div>

<script src="script.js"></script>

  <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBoIILW2sbfyuSSvK108YAxnLPB_GlZZP0",

authDomain: "game-6df94.firebaseapp.com",

projectId: "game-6df94",

storageBucket: "game-6df94.firebasestorage.app",

messagingSenderId: "443187158566",

appId: "1:443187158566:web:2e055a515f29b5021110e7"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginLink =
document.getElementById("loginLink");

const userInfo =
document.getElementById("userInfo");

const userEmail =
document.getElementById("userEmail");

const logoutBtn =
document.getElementById("logoutBtn");

onAuthStateChanged(auth,(user)=>{

if(user){

loginLink.style.display="none";

userInfo.style.display="flex";

userEmail.innerHTML=
"👤 " + user.email;

}else{

loginLink.style.display="block";

userInfo.style.display="none";

}

});

logoutBtn.addEventListener(
"click",
async()=>{

await signOut(auth);

window.location.href="/";

});

</script>
</body>
</html>
