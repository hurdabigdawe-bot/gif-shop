<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBoIILW2sbfyuSSvK108YAxnLPB_GlZZP0",
authDomain: "game-6df94.firebaseapp.com",
projectId: "game-6df94",
storageBucket: "game-6df94.firebasestorage.app",
messagingSenderId: "443187158566",
appId: "1:443187158566:web:2e055a515f29b5021110e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginLink =
document.getElementById("loginLink");

const userInfo =
document.getElementById("userInfo");

const userEmail =
document.getElementById("userEmail");

const userCredits =
document.getElementById("userCredits");

const logoutBtn =
document.getElementById("logoutBtn");

onAuthStateChanged(auth, async (user)=>{

if(user){

loginLink.style.display = "none";
userInfo.style.display = "flex";

userEmail.innerText =
"👤 " + user.email;

try{

const userDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(userDoc.exists()){

const data =
userDoc.data();

userCredits.innerText =
"💰 " +
(data.credits || 0) +
" kredit";

document.getElementById(
"userWins"
).innerText =
"🏆 " +
(data.wins || 0) +
" győzelem";

document.getElementById(
"userLosses"
).innerText =
"❌ " +
(data.losses || 0) +
" vereség";

const totalGames =
(data.wins || 0) +
(data.losses || 0);

let rate = 0;

if(totalGames > 0){

rate = Math.round(
((data.wins || 0) /
totalGames) * 100
);

}

document.getElementById(
"userRate"
).innerText =
"📈 " + rate + "%";

}else{

userCredits.innerText =
"💰 0 kredit";

}

}catch(error){

console.error(error);

userCredits.innerText =
"💰 Hiba";

}

}else{

loginLink.style.display =
"block";

userInfo.style.display =
"none";

}

});

logoutBtn.addEventListener(
"click",
async()=>{

await signOut(auth);

location.reload();

});

</script>
