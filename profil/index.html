<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👤 Profil</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>👤 Profil</h1>

<div class="card">

<div class="row">
<span>Email:</span>
<strong id="email">Betöltés...</strong>
</div>

<div class="row">
<span>💰 Kredit:</span>
<strong id="credits">0</strong>
</div>

<div class="row">
<span>🏆 Győzelem:</span>
<strong id="wins">0</strong>
</div>

<div class="row">
<span>❌ Vereség:</span>
<strong id="losses">0</strong>
</div>

<div class="row">
<span>🎮 Játékok:</span>
<strong id="games">0</strong>
</div>

<div class="row">
<span>📈 Win Rate:</span>
<strong id="winrate">0%</strong>
</div>

<div class="row">
<span>💎 Rang:</span>
<strong id="rank">Bronz</strong>
</div>

<div class="row">
<span>📅 Regisztráció:</span>
<strong id="createdAt">-</strong>
</div>

</div>
</div>

<a href="/" class="back-btn">
🏠 Vissza
</a>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
