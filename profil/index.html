<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>👤 Profil</title>

<link rel="stylesheet"
href="style.css">

</head>

<div>

</span>

<span>

</span>

0

<div class="icon">
🎰
</div>

<div>

<span>

</span>

0

</div>

</div>

<div class="icon">
💎
</div>

<div>

<span>
Jackpotok
</span>

</h3>

</div>

</div>

<div class="icon">

<div>

<span>

</span>

0
</h3>

</div>

</div>

<h2>

-

</div>

<span>

0

id="achievementList"

Betöltés...

</div>

</div>

</div>

class="back-btn">

</a>

<script type="module"
src="script.js"></script>
