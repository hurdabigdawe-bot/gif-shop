<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 Slot Machine</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="userPanel" class="user-panel">

<a href="/login/" id="loginLink">
🔐 Bejelentkezés
</a>

<div id="userInfo" style="display:none">

<div class="user-data">

<div id="userEmail"></div>

<div id="userCredits">
💰 0 kredit
</div>

</div>

<button id="logoutBtn">
🚪 Kilépés
</button>

</div>

</div>

<div class="casino">

<h1>🎰 SLOT MACHINE</h1>

<div class="machine">

<div class="reel" id="reel1">
🍒
</div>

<div class="reel" id="reel2">
🍋
</div>

<div class="reel" id="reel3">
⭐
</div>

</div>

<div class="bet-panel">

<label for="betAmount">
💸 Tét:
</label>

<select id="betAmount">

<option value="100">
100 kredit
</option>

<option value="500">
500 kredit
</option>

<option value="1000">
1000 kredit
</option>

<option value="5000">
5000 kredit
</option>

</select>

</div>

<button id="spinBtn">
🎰 PÖRGETÉS
</button>

<div id="result">
Sok szerencsét!
</div>

<div class="stats">

<div>
🎰 Pörgetések:
<span id="slotSpins">0</span>
</div>

<div>
🎉 Nyerések:
<span id="slotWins">0</span>
</div>

<div>
❌ Veszteségek:
<span id="slotLosses">0</span>
</div>

<div>
💰 Profit:
<span id="slotProfit">0</span>
</div>

<div>
💎 Jackpotok:
<span id="slotJackpots">0</span>
</div>

</div>

<a
class="leaderboard-btn"
href="/toplista/">

🏆 TOPLISTA

</a>

</div>

<a href="/" class="back-btn">
🏠 Vissza
</a>

<script type="module" src="script.js"></script>

</body>
</html>
