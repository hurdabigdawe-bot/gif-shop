<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Gratulálunk!</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

#gif{
    max-width:700px;
    width:100%;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,136,.3);
}

.loading{
    color:#00ff88;
    margin:20px;
    font-size:20px;
}

audio{
    margin-top:20px;
    width:100%;
    max-width:600px;
}

</style>
</head>
<body>

<h1>🎉 Köszönjük a vásárlást! 🎉</h1>

<div class="loading" id="status">
GIF betöltése...
</div>

<img id="gif">

<script>

const API_KEY = "8tdtdvarTCKxP1rKtecIPy6TH56PZUem";

const tags = [
    "funny",
    "meme",
    "cat",
    "fail",
    "reaction",
    "laugh",
    "funny animal",
    "crazy"
];

async function loadGif(){

    const randomTag =
        tags[Math.floor(Math.random() * tags.length)];

    try{

        const response = await fetch(
            `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${encodeURIComponent(randomTag)}`
        );

        const data = await response.json();

        document.getElementById("gif").src =
            data.data.images.original.url;

        document.getElementById("status").innerText =
            "🎉 Jó szórakozást!";

    }catch(error){

        document.getElementById("status").innerText =
            "Nem sikerült GIF-et betölteni.";

        console.error(error);
    }
}

loadGif();

</script>

</body>
</html>
