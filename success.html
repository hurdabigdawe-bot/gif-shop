<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Jutalom Sorsolás</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#080808;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    min-height:100vh;
    overflow-x:hidden;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

#countdown{
    font-size:120px;
    font-weight:bold;
    color:#00ff88;
    text-shadow:0 0 30px #00ff88;
}

#spinner{
    font-size:45px;
    margin-top:30px;
    color:#00d9ff;
}

#result{
    display:none;
}

#rarity{
    font-size:50px;
    margin:25px 0;
    font-weight:bold;
}

#gif{
    width:100%;
    max-width:750px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(255,255,255,.2);
}

.common{
    color:#00ff88;
}

.rare{
    color:#4db8ff;
}

.epic{
    color:#c13cff;
}

.legendary{
    color:gold;
    text-shadow:0 0 25px gold;
}

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}

</style>
</head>
<body>

<div class="container">

<h1>🎰 Jutalom Sorsolás 🎰</h1>

<div id="countdown">5</div>

<div id="spinner">
🎲 Készül a sorsolás...
</div>

<div id="result">

<div id="rarity"></div>

<img id="gif">

<h2 style="margin-top:20px;">
🎉 Gratulálunk!
</h2>

<p>
A rendszer kisorsolta a jutalmadat.
</p>

</div>

</div>

<script>

const API_KEY = "8tdtdvarTCKxP1rKtecIPy6TH56PZUem";

const tags = [
    "funny",
    "meme",
    "reaction",
    "cat",
    "fail",
    "laugh",
    "crazy",
    "funny animal"
];

let countdown = 5;

const spinnerTexts = [
    "🎲 Meme keresése...",
    "😂 Vicces GIF kiválasztása...",
    "🎁 Jutalom generálása...",
    "🔥 Ritkaság számítása...",
    "🎰 Sorsolás fut..."
];

function getRarity(){

    const roll = Math.random()*100;

    if(roll < 1){
        return {
            text:"🟡 LEGENDÁS",
            className:"legendary"
        };
    }

    if(roll < 10){
        return {
            text:"🟣 EPIKUS",
            className:"epic"
        };
    }

    if(roll < 30){
        return {
            text:"🔵 RITKA",
            className:"rare"
        };
    }

    return {
        text:"🟢 GYAKORI",
        className:"common"
    };
}

function launchConfetti(){

    for(let i=0;i<150;i++){

        const c = document.createElement("div");

        c.className = "confetti";

        c.style.left =
            Math.random()*100 + "vw";

        c.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        c.style.animationDuration =
            (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

async function revealReward(){

    try{

        const rarity = getRarity();

        document.getElementById("rarity").innerText =
            rarity.text;

        document.getElementById("rarity").className =
            rarity.className;

        const tag =
            tags[Math.floor(Math.random()*tags.length)];

        const response = await fetch(
            `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${encodeURIComponent(tag)}`
        );

        const data = await response.json();

        document.getElementById("gif").src =
            data.data.images.original.url;

        document.getElementById("countdown").style.display =
            "none";

        document.getElementById("spinner").style.display =
            "none";

        document.getElementById("result").style.display =
            "block";

        launchConfetti();

    }catch(error){

        console.error(error);

        document.getElementById("spinner").innerHTML =
            "❌ Hiba történt a GIF betöltésekor.";
    }
}

const countdownInterval = setInterval(()=>{

    countdown--;

    document.getElementById("countdown").innerText =
        countdown;

    document.getElementById("spinner").innerText =
        spinnerTexts[
            Math.floor(Math.random()*spinnerTexts.length)
        ];

    if(countdown <= 0){

        clearInterval(countdownInterval);

        revealReward();
    }

},1000);

</script>

</body>
</html>
